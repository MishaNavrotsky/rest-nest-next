version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nestjs_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: my_nestjs_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nestjs_redis_dev
    command: redis-server --requirepass mysecretpassword # 🚀 Sets the Redis password
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: